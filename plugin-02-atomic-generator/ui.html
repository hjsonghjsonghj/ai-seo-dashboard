<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atomic Component Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #020617;
      --surface:    #0f172a;
      --surface-2:  #1e293b;
      --border:     #334155;
      --border-2:   #475569;
      --text-1:     #f1f5f9;
      --text-2:     #94a3b8;
      --text-3:     #CBD5E1;
      --brand:      #8b5cf6;
      --brand-deep: #7c3aed;
      --primary:    #3b82f6;
      --radius:     8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      font-size: 13px;
      padding: 12px;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .header-icon {
      width: 28px; height: 28px; background: var(--brand);
      border-radius: 6px; display: grid; place-items: center;
      font-size: 15px; flex-shrink: 0;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: var(--text-1); }
    .header p  { font-size: 11px; color: var(--text-2); margin-top: 1px; }

    /* Section */
    .section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px; margin-bottom: 8px;
    }
    .section-label {
      font-size: 10px; font-weight: 600; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px;
    }

    /* Grid */
    .grid   { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }

    /* Button */
    .btn {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface-2); color: var(--text-1);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 9px; font-size: 11px; font-weight: 500;
      cursor: pointer; transition: background 0.12s, border-color 0.12s;
      line-height: 1; white-space: nowrap; width: 100%;
    }
    .btn:hover  { background: var(--border); border-color: var(--border-2); }
    .btn:active { background: var(--border-2); }
    .btn.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    .btn.primary:hover { background: var(--brand-deep); border-color: var(--brand-deep); }
    .btn .icon { font-size: 12px; flex-shrink: 0; }
    .btn-full { justify-content: flex-start; }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 7px 0; }

    /* Hint */
    .hint {
      font-size: 10px; color: var(--text-2);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 9px; line-height: 1.5;
    }
    .hint strong { color: var(--text-3); }

    /* Toast */
    #toast {
      position: fixed; bottom: 8px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--surface-2); border: 1px solid var(--border-2);
      border-radius: 6px; padding: 5px 11px; font-size: 11px; color: var(--text-1);
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">⚛</div>
    <div>
      <h1>Atomic Component Generator</h1>
      <p>v0 → Figma  ·  globals.css 토큰 기반</p>
    </div>
  </div>

  <!-- Foundation -->
  <div class="section">
    <div class="section-label">Foundation</div>
    <div class="grid">
      <button class="btn" data-action="generate-slot">
        <span class="icon">🔲</span> Slot Component
      </button>
      <button class="btn" data-action="generate-palette">
        <span class="icon">🎨</span> Color Palette
      </button>
    </div>
  </div>

  <!-- Atoms -->
  <div class="section">
    <div class="section-label">Atoms</div>
    <div class="grid">
      <button class="btn" data-action="generate-button">
        <span class="icon">🔘</span> Button Set
      </button>
      <button class="btn" data-action="generate-badge">
        <span class="icon">🏷</span> Badge Set
      </button>
      <button class="btn" data-action="generate-input">
        <span class="icon">📝</span> Input
      </button>
      <button class="btn" data-action="generate-avatar">
        <span class="icon">👤</span> Avatar Set
      </button>
    </div>
    <div class="divider"></div>
    <div class="grid-3">
      <button class="btn" data-action="generate-checkbox">
        <span class="icon">☑️</span> Checkbox
      </button>
      <button class="btn" data-action="generate-radio">
        <span class="icon">🔵</span> Radio
      </button>
      <button class="btn" data-action="generate-switch">
        <span class="icon">🔄</span> Switch
      </button>
    </div>
    <div class="divider"></div>
    <div class="grid">
      <button class="btn" data-action="generate-toggle">
        <span class="icon">🔁</span> Toggle Set
      </button>
      <button class="btn" data-action="generate-alert">
        <span class="icon">🔔</span> Alert Set
      </button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-full" data-action="generate-separator">
      <span class="icon">➖</span> Separator (Horizontal + Vertical)
    </button>
  </div>

  <!-- Molecules -->
  <div class="section">
    <div class="section-label">Molecules</div>
    <div class="grid">
      <button class="btn" data-action="generate-button-group">
        <span class="icon">🔗</span> Button Group
      </button>
      <button class="btn" data-action="generate-field">
        <span class="icon">🗂</span> Field
      </button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-full" data-action="generate-card">
      <span class="icon">🃏</span> Card (Header + Content + Footer)
    </button>
  </div>

  <!-- Hint -->
  <div class="hint">
    <strong>Button Group</strong>: 캔버스에서 개별 Button 컴포넌트(ComponentSet 아닌 것)를 선택 후 실행.<br>
    <strong>컴포넌트들</strong>은 기존 캔버스 내용 아래에 자동 배치됩니다.
  </div>

  <div id="toast"></div>

  <script>
    const toast = document.getElementById('toast');
    let toastTimer;
    function showToast(msg) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.getAttribute('data-action');
        parent.postMessage({ pluginMessage: { type } }, '*');
        showToast(`실행 중: ${btn.textContent.trim()}`);
      });
    });
    window.onmessage = (event) => {
      const msg = event.data?.pluginMessage;
      if (!msg) return;
      if (msg.type === 'status') showToast(msg.message);
    };
  </script>
</body>
</html>
